services:
  mysql:
    image: mysql:8.4
    container_name: zapateria-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: zapateria
      MYSQL_USER: zapateria
      MYSQL_PASSWORD: zapateria
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - zapateria-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: ./ecommerce-zapateria
      dockerfile: Dockerfile
    container_name: zapateria-app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  zapateria-mysql-data:
