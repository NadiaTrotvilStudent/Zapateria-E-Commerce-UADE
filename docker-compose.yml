services:
  mysql:
    image: mysql:8.4
    container_name: zapateria-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: zapateria
      MYSQL_USER: zapateria
      MYSQL_PASSWORD: zapateria
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - zapateria-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  zapateria-mysql-data:
