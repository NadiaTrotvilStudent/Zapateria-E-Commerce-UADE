spring.application.name=ecommerce-zapateria
app.security.jwt.secret=${JWT_SECRET:zapateria-ecommerce-uade-secret-key-for-hs256-local-development}
app.security.jwt.access-token-ttl-minutes=15
app.security.jwt.refresh-token-ttl-days=7

spring.datasource.url=jdbc:mysql://localhost:3307/zapateria?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:zapateria}
spring.datasource.password=${DB_PASSWORD:zapateria}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
