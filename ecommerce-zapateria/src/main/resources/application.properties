spring.application.name=ecommerce-zapateria
 
spring.datasource.url=jdbc:mysql://localhost:3306/zapateria?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
 
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
 
app.security.jwt.secret=zapateria-ecommerce-uade-secret-key-for-hs256-local-development
app.security.jwt.access-token-ttl-minutes=15
app.security.jwt.refresh-token-ttl-days=7