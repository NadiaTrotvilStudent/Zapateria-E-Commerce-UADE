spring.application.name=ecommerce-zapateria

# Perfil por defecto: H2 en memoria, no requiere MySQL.
# Para usar MySQL local (puerto 3307) -> SPRING_PROFILES_ACTIVE=mysql
# Para Docker Compose -> SPRING_PROFILES_ACTIVE=docker
spring.profiles.active=local

app.security.jwt.secret=zapateria-ecommerce-uade-secret-key-for-hs256-local-development
app.security.jwt.access-token-ttl-minutes=15
app.security.jwt.refresh-token-ttl-days=7
app.seed.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Hikari: si la base no responde, fallar rapido en vez de bloquear el thread 30s.
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.validation-timeout=2000

# No filtrar stacktraces al cliente.
server.error.include-stacktrace=never
server.error.include-message=always
server.error.include-binding-errors=always
