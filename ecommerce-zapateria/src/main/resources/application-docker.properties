spring.datasource.url=jdbc:mysql://mysql:3306/zapateria?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=zapateria
spring.datasource.password=zapateria

# Dialecto explicito asi Hibernate no necesita conectar al arranque para detectarlo.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Dentro del contenedor no hace falta el hot reload de DevTools.
spring.devtools.restart.enabled=false
