spring.datasource.url=jdbc:mysql://localhost:3307/zapateria?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=zapateria
spring.datasource.password=zapateria

# Dialecto explicito para que Hibernate no necesite conectar al arranque
# para determinar el dialecto. Sin esto, si MySQL no esta, la app crashea.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
